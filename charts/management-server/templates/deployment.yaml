apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "management-server.fullname" . }}
  labels:
    {{- include "management-server.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "management-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "management-server.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "management-server.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: postgres:18
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until pg_isready -h {{ .Release.Name }}-postgresql -p 5432 -U access -d studiodb
              do
                sleep 2
              done
              echo "Postgres ready!"
          env:
            - name: PGPASSWORD
              value: password
        {{- if index .Values "cert-manager" "enabled" }}
        - name: wait-for-cert-manager
          image: bitnami/kubectl
          command:
            - sh
            - -c
            - |
              set -e
              ns=cert-manager
              rel="{{ .Release.Name }}"
              echo "Waiting for cert-manager workloads (${rel}-*)..."
              kubectl wait --for=condition=available --timeout=300s "deployment/${rel}-cert-manager-cainjector" -n "$ns"
              kubectl wait --for=condition=available --timeout=300s "deployment/${rel}-cert-manager" -n "$ns"
              kubectl wait --for=condition=available --timeout=300s "deployment/${rel}-cert-manager-webhook" -n "$ns"
              echo "Waiting for validating webhook CA bundle (cainjector must patch APIService)..."
              deadline=$(($(date +%s) + 300))
              while [ "$(date +%s)" -lt "$deadline" ]; do
                b="$(kubectl get validatingwebhookconfiguration "${rel}-cert-manager-webhook" -o jsonpath='{.webhooks[0].clientConfig.caBundle}' 2>/dev/null || true)"
                if [ "${#b}" -ge 100 ]; then
                  echo "Webhook CA bundle ready."
                  exit 0
                fi
                sleep 3
              done
              echo "Timeout: ValidatingWebhookConfiguration still has no caBundle — check cert-manager-cainjector logs and RBAC."
              exit 1
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: PGHOST
              value: "{{ .Release.Name }}-postgresql"
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: access
            - name: PGPASSWORD
              value: password
            - name: PGDATABASE
              value: studiodb
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
