repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami

releases:
  - name: cert-manager
    namespace: cert-manager
    createNamespace: true
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.20.0
    installed: true
    labels:
      component: cert-manager
    values:
      - ./values/cert-manager.yaml
  - name: postgresql
    chart: bitnami/postgresql
    version: 18.3.0
    installed: true
    labels:
      component: postgresql
    values:
      - ./values/postgres.yaml
    hooks:
      - events: ["prepare"]
        showlogs: true
        command: sh
        args:
          - -c
          - |
          - kubectl create configmap db-init-configmap --from-file=./resources/db-setup.sql -o yaml --dry-run=client | kubectl apply -f -
  - name: management-server
    chart: ../management-server
    installed: true
    labels:
      component: management-server
    needs:
      - cert-manager/cert-manager
      - postgresql