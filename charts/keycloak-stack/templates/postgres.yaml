apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql-db
spec:
  serviceName: postgresql-db-service
  selector:
    matchLabels:
      app: postgresql-db
  replicas: 1
  template:
    metadata:
      labels:
        app: postgresql-db
    spec:
      imagePullPolicy: IfNotPresent
      containers:
        - name: postgresql-db
          image: postgres:15
          volumeMounts:
            - mountPath: /data
              name: cache-volume
          env:
            - name: POSTGRES_USER
              value: {{ .Values.keycloak.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.keycloak.postgres.password | quote }}
            - name: PGDATA
              value: /data/pgdata
            - name: POSTGRES_DB
              value: keycloak
{{- if not .Values.keycloak.postgres.persistence.enabled }}
      volumes:
        - name: cache-volume
          emptyDir: {}
{{- end }}
{{- if .Values.keycloak.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: cache-volume
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.keycloak.postgres.persistence.size | quote }}
        {{- with .Values.keycloak.postgres.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
spec:
  selector:
    app: postgresql-db
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
