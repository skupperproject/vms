keycloak:
  http:
    httpEnabled: true
    tlsSecret: ""
  ingress:
    enabled: true
    className: nginx
    tlsSecret: ""
  hostname: ""

  # Embedded PostgreSQL StatefulSet (templates/postgres.yaml). Create the Secret in the
  # release namespace before install; name and keys must match the Keycloak CR DB refs.
  postgres:
    credentialsSecret:
      name: keycloak-db-secret
      usernameKey: username
      passwordKey: password
    persistence:
      enabled: true
      size: 5Gi
      # Omit or leave empty to use the cluster default StorageClass.
      storageClass: ""