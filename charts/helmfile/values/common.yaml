# Shared Postgres settings (environments.default.values). Consumed by values/*.gotmpl.
#
# host: PGHOST when app and DB are on the same cluster (in-cluster Service name, usually postgresql).
# port: default PGPORT when clusters.postgresPort is unset (5432).
# applicationHost: optional PGHOST override; wins over clusters.postgresHost when set.
postgres:
  host: postgresql
  applicationHost: ""
  port: 5432
  user: access
  password: password
  database: studiodb
