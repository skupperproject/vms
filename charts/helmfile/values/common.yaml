# Shared Postgres settings (environments.default.values). Consumed by values/*.gotmpl.
#
# host: PGHOST (in-cluster Service name, usually postgresql).
# port: PGPORT.
# user: PGUSER for superuser - used for bootstrapping
# password: PGPASSWORD for superuser - used for bootstrapping
# database: PGDATABASE
# persistence: 
#   enabled: whether to deploy a pv for postgres.
#   size: size of the pv.
#   storageClass: storage class if postgres persistence is enabled. Leave empty for default storage class.
# extraEnv:
#   APP_USER_PASSWORD: password for the 'app_user' role
#   APP_SYSTEM_PASSWORD: password for the 'app_system' role
postgres:
  host: postgresql
  port: 5432
  user: postgres
  password: password
  database: studiodb
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  extraEnv:
    APP_USER_PASSWORD: ""
    APP_SYSTEM_PASSWORD: ""
  imagePullSecret: ""

keycloak:
  http:
    httpEnabled: true
    tlsSecret: ""
  ingress:
    enabled: true
    className: ""
    tlsSecret: ""
  hostname: ""
  postgres:
    user: ""
    password: ""
    persistence:
      enabled: true
      size: 5Gi
      storageClass: ""

# contexts: kubectl config get-contexts. Empty = use current context for that tier.
#
# applicationKubeContext — cert-manager and management-server (same cluster).
# dataKubeContext — postgresql; empty = same as applicationKubeContext.
#
# dataNamespace / dataCreateNamespace — postgresql release + db-init hook.
#
# skupperLinkAccessCluster: app | data
# skupperLinkAccess: default | route | loadbalancer

clusters:
  applicationKubeContext: ""
  dataKubeContext: ""
  dataNamespace: ""
  dataCreateNamespace: false
  skupperLinkAccessCluster: ""
  skupperLinkAccess: ""

# set to true to deploy the component
deploy:
  certManager: true
  keycloak: true
  postgresql: true
  managementServer: true
